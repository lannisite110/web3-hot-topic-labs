apiVersion: batch/v1
kind: Job
metadata:
  name: zk-circuit-sim
  labels:
    edu.web3/plugin-id: edu.hot.zk-circuit
    edu.web3/lang-group: zk
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.zk-circuit
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-zk:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_ZK_CIRCUIT_COMPILE"
            - name: EDU_LANG_GROUP
              value: "zk"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - bash
            - -ec
            - |
              echo "==> HOT_ZK_CIRCUIT_COMPILE zk toolchain gate"
              scarb --version | head -1
              echo "cairo circuit compile toolchain gate OK (testnet-only)"
