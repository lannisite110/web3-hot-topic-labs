apiVersion: batch/v1
kind: Job
metadata:
  name: aa-wallet-sim
  labels:
    edu.web3/plugin-id: edu.hot.aa-wallet
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.aa-wallet
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_AA_WALLET_SIM"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - /entrypoint.sh
            - bash
            - -ec
            - |
              echo "==> HOT_AA_WALLET_SIM evm toolchain gate"
              solc --version | head -1
              cat > /tmp/AAWallet.sol <<'SOL'
              pragma solidity ^0.8.20;
              contract AAWalletDemo {
                  address public owner;
                  constructor(address o) { owner = o; }
              }
              SOL
              solc --optimize --combined-json bin /tmp/AAWallet.sol > /tmp/aa-out.json
              test -s /tmp/aa-out.json
              echo "AA wallet compile gate OK (testnet-only)"
