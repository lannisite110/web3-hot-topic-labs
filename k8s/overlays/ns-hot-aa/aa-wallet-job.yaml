apiVersion: batch/v1
kind: Job
metadata:
  name: aa-wallet-sim
  labels:
    edu.web3/plugin-id: edu.hot.aa-wallet
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.aa-wallet
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_AA_WALLET_SIM"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - sh
            - -c
            - |
              echo "[testnet] plugin=edu.hot.aa-wallet task=${TASK_TYPE} chain=${CHAIN_ID}"
              echo "Simulation completed (educational only)"
