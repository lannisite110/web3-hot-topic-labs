apiVersion: batch/v1
kind: Job
metadata:
  name: aa-session-sim
  labels:
    edu.web3/plugin-id: edu.hot.aa-session
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.aa-session
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_AA_SESSION_KEY_DEMO"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - /entrypoint.sh
            - bash
            - -ec
            - |
              echo "==> HOT_AA_SESSION_KEY_DEMO evm toolchain gate"
              solc --version | head -1
              cat > /tmp/Session.sol <<'SOL'
              pragma solidity ^0.8.20;
              contract SessionKeyDemo { mapping(bytes32 => uint256) public expiry; }
              SOL
              solc --optimize --combined-json bin /tmp/Session.sol > /tmp/out.json
              test -s /tmp/out.json
              echo "session key compile gate OK (testnet-only)"
