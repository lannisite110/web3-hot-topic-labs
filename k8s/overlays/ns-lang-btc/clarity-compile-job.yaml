apiVersion: batch/v1
kind: Job
metadata:
  name: clarity-compile
  labels:
    edu.web3/plugin-id: edu.hot.language-advisor
    edu.web3/lang-group: btc
    edu.web3/compliance: testnet-only
spec:
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.language-advisor
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-btc:0.1.0
          command: ["clarinet", "--version"]
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: EDU_LANG_GROUP
              value: btc
