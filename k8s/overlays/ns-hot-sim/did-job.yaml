apiVersion: batch/v1
kind: Job
metadata:
  name: did-sim
  labels:
    edu.web3/plugin-id: edu.hot.did
    edu.web3/lang-group: move
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.did
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-move:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_DID_PRIVACY_DEMO"
            - name: EDU_LANG_GROUP
              value: "move"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - bash
            - -ec
            - |
              echo "==> HOT_DID_PRIVACY_DEMO move toolchain gate"
              aptos --version | head -1
              sui --version | head -1
              echo "module ref: DidPrivacy.move (selective_disclosure)"
              echo "move toolchain gate OK (testnet-only)"
