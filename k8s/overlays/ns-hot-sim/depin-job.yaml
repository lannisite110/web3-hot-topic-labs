apiVersion: batch/v1
kind: Job
metadata:
  name: depin-sim
  labels:
    edu.web3/plugin-id: edu.hot.depin
    edu.web3/lang-group: solana
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.depin
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-solana:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_DEPIN_NODE_SIM"
            - name: EDU_LANG_GROUP
              value: "solana"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - bash
            - -ec
            - |
              echo "==> HOT_DEPIN_NODE_SIM solana toolchain gate"
              rustc --version | head -1
              anchor --version | head -1
              echo "solana/anchor toolchain gate OK (testnet-only)"
