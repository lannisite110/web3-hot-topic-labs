apiVersion: batch/v1
kind: Job
metadata:
  name: mev-sim
  labels:
    edu.web3/plugin-id: edu.hot.mev
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.mev
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_MEV_PBS_SIM"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - /entrypoint.sh
            - bash
            - -ec
            - |
              echo "==> HOT_MEV_PBS_SIM evm toolchain + PBS compile gate"
              solc --version | head -1
              huff --version 2>/dev/null | head -1 || echo "huff: skipped"
              cat > /tmp/MevPbsAuction.sol <<'SOL'
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              contract MevPbsAuction {
                  mapping(uint256 => uint256) public slotBids;
                  function submitBid(uint256 slot) external payable { slotBids[slot] += msg.value; }
              }
              SOL
              solc --optimize --combined-json bin /tmp/MevPbsAuction.sol > /tmp/pbs-out.json
              test -s /tmp/pbs-out.json
              echo "PBS solidity compile OK (testnet-only)"
