apiVersion: batch/v1
kind: Job
metadata:
  name: rwa-edu-sim
  labels:
    edu.web3/plugin-id: edu.hot.rwa-edu
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.rwa-edu
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_RWA_EDU_SIM"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - /entrypoint.sh
            - bash
            - -ec
            - |
              echo "==> ${TASK_TYPE} evm toolchain gate"
              solc --version | head -1
              cat > /tmp/Gate.sol <<'SOL'
              pragma solidity ^0.8.20;
              contract EduGate { uint256 public n; function touch() external { n += 1; } }
              SOL
              solc --optimize --combined-json bin /tmp/Gate.sol > /tmp/out.json
              test -s /tmp/out.json
              echo "evm compile gate OK (testnet-only)"
