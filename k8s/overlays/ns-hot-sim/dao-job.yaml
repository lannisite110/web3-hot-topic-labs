apiVersion: batch/v1
kind: Job
metadata:
  name: dao-sim
  labels:
    edu.web3/plugin-id: edu.hot.dao
    edu.web3/lang-group: evm
    edu.web3/compliance: testnet-only
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.dao
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-evm:0.1.0
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: TASK_TYPE
              value: "HOT_DAO_VOTE_SIM"
            - name: EDU_LANG_GROUP
              value: "evm"
            - name: RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: testnet-rpc-sepolia
                  key: rpc_url
          command:
            - /entrypoint.sh
            - bash
            - -ec
            - |
              echo "==> HOT_DAO_VOTE_SIM evm toolchain + vote compile gate"
              solc --version | head -1
              cat > /tmp/DaoVote.sol <<'SOL'
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              contract DaoVoteDemo {
                  mapping(uint256 => uint256) public yesVotes;
                  function vote(uint256 id, bool support) external {
                      if (support) yesVotes[id] += 1;
                  }
              }
              SOL
              solc --optimize --combined-json bin /tmp/DaoVote.sol > /tmp/dao-out.json
              test -s /tmp/dao-out.json
              echo "DAO vote compile OK (testnet-only)"
