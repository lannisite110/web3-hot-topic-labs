apiVersion: batch/v1
kind: Job
metadata:
  name: cadence-compile
  labels:
    edu.web3/plugin-id: edu.hot.language-advisor
    edu.web3/lang-group: flow
    edu.web3/compliance: testnet-only
spec:
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.hot.language-advisor
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: edu/toolchain-flow:0.1.0
          command: ["flow", "version"]
          env:
            - name: CHAIN_ID
              value: "11155111"
            - name: EDU_LANG_GROUP
              value: flow
