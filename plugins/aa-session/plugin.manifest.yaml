apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.hot.aa-session
  name: AA Session Key Lab
  version: 0.3.0
  repo: web3-hot-topic-labs
  compliance_tier: hot_topic

spec:
  coreVersion: ">=0.6.0 <2.0.0"
  taskTypes:
    - HOT_AA_SESSION_KEY_DEMO
  namespaces:
    - ns-hot-aa
  allowedChainIds:
    - 11155111
  frontend:
    routePrefix: /labs/edu.hot.aa-session
    entry: plugins/aa-session/frontend/plugin.ts
  rules:
    entry: plugins.rules.aa_session:evaluate
  contracts:
    - path: plugins/aa-session/contracts/SessionKeyDemo.sol
      language: solidity
  k8s:
    jobTemplate: k8s/overlays/ns-hot-aa/aa-session-job.yaml
  docs:
    - docs/tutorials/aa-session-intro.md
